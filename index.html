<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Nusantara Capital — sign in</title>
<style>
:root{color-scheme:light}
html,body{height:100%}
body{margin:0;display:flex;align-items:center;justify-content:center;
background:#f4f0e8;color:#2c2721;
font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif}
.card{width:100%;max-width:400px;margin:0 20px;padding:32px;text-align:center;background:#fcfaf5;border-radius:12px}
.brand{font-size:16px;line-height:24px;font-weight:500;letter-spacing:0;color:#2c2721;margin-bottom:8px}
.sub{margin:0 0 24px;color:#6f665a;font-size:14px;line-height:20px}
form{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
input{height:40px;padding:0 14px;border:1px solid #e4dccf;border-radius:10px;background:#f4f0e8;
color:#2c2721;font-size:14px;line-height:20px;outline:none;text-align:center}
input:focus{border-color:#a05c33;background:#fcfaf5}
button{height:40px;padding:0 20px;border:0;border-radius:10px;background:#a05c33;color:#fcfaf5;
font-size:14px;line-height:20px;font-weight:600;cursor:pointer}
button:hover{filter:brightness(1.08)}
button:focus-visible{outline:2px solid #a05c33;outline-offset:2px}
.err{margin:0;font-size:12px;line-height:18px;color:#b05244}
.err[hidden]{display:none}
.foot{margin:0;font-size:12px;line-height:18px;color:#a89d8c}
</style></head>
<body><div class="card">
<div class="brand">Nusantara Capital</div>
<div class="sub">This console is private. Sign in to continue.</div>
<form id="g" autocomplete="off">
<input id="u" name="u" placeholder="username" autocapitalize="none" spellcheck="false" required>
<input id="p" name="p" type="password" placeholder="password" required>
<button type="submit">Sign in &rarr;</button>
<p class="err" id="e" hidden>wrong username or password</p>
</form>
<div class="foot">Soft gate on static hosting — not server-side security. · research / paper only.</div>
</div>
<script>
(function(){
var K='hl_ok',F='fund.html';
try{if(sessionStorage.getItem(K)==='1'){location.replace(F);return;}}catch(x){}
document.getElementById('g').addEventListener('submit',function(ev){
ev.preventDefault();
var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
if(btoa(u)==='SEw='&&btoa(p)==='bGltMDA='){
try{sessionStorage.setItem(K,'1');}catch(x){}
location.replace(F);
}else{
document.getElementById('e').hidden=false;
}});
})();
</script>
</body></html>
